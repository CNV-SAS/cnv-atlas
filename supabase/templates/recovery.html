<h2>Restablecer contrasena de Atlas</h2>
<p>Se solicito restablecer tu contrasena. Haz clic en el enlace para fijar una nueva:</p>
<p>
  <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=recovery&next=/set-password">
    Restablecer contrasena
  </a>
</p>
<p>Si no solicitaste esto, ignora este correo; tu contrasena no cambiara.</p>
